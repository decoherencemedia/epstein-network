  function restoreTabState(tab) {
    if (!lightboxEl.hidden) navigateLightbox("close");
    if (tab === "people") {
      selected = peopleState.selected.map(function (p) {
        return { person_id: p.person_id, name: p.name };
      });
      if (inputEl) inputEl.value = peopleState.nameInput;
      renderSelected();
      destroyPeopleMasonry();
      masonryEl.innerHTML = "";
      resultsWrap.hidden = true;
      restoreCachedPhotoResults(
        peopleState.photoItems,
        setResultsHeadingForPeopleSelection,
        peopleState.statusSnapshot,
        peopleState.photoTotal
      );
    } else {
      selected = [];
      if (documentInputEl) documentInputEl.value = documentState.input;
      updateDocumentValidationUi();
      destroyPeopleMasonry();
      masonryEl.innerHTML = "";
      resultsWrap.hidden = true;
      restoreCachedPhotoResults(
        documentState.photoItems,
        function () {
          setResultsHeadingForDocumentPrefix(documentState.input);
        },
        documentState.statusSnapshot,
        documentState.photoTotal
      );
    }
    updateSearchButton();
  }

  function syncTabUiOnly(tab) {
    const isPeople = tab === "people";
    if (tabPeopleBtn && tabDocumentBtn) {
      tabPeopleBtn.setAttribute("aria-selected", isPeople ? "true" : "false");
      tabDocumentBtn.setAttribute("aria-selected", isPeople ? "false" : "true");
      tabPeopleBtn.tabIndex = isPeople ? 0 : -1;
      tabDocumentBtn.tabIndex = isPeople ? -1 : 0;
    }
    if (panelPeopleEl) panelPeopleEl.toggleAttribute("hidden", !isPeople);
    if (panelDocumentEl) panelDocumentEl.toggleAttribute("hidden", isPeople);
    if (openGraphBtn) openGraphBtn.hidden = !isPeople;
  }

  function applyUrlForCurrentTab() {
    const params = new URLSearchParams(window.location.search);
    params.delete("photo");
    if (activeSearchTab === "people") {
      params.set("tab", "people");
      params.delete("document");
      const ids = getSelectedPersonIds();
      if (ids.length) {
        params.set("person_ids", ids.join(","));
      } else {
        params.delete("person_ids");
      }
    } else {
      params.set("tab", "document");
      params.delete("person_ids");
      const docNorm = documentInputEl && normalizeDocumentPrefixForApi(documentInputEl.value);
      if (docNorm) {
        params.set("document", docNorm);
      } else {
        const raw = documentInputEl && String(documentInputEl.value || "").trim();
        if (raw) {
          params.set("document", raw);
        } else {
          params.delete("document");
        }
      }
    }
    const qs = params.toString();
    const nextUrl =
      window.location.pathname +
      (qs ? "?" + qs : "") +
      window.location.hash;
    window.history.replaceState(null, "", nextUrl);
  }

  /**
   * @param {number} [offset]
   * @param {string | null | undefined} [apiPhoto] — if set (URL bootstrap only), sent as ``photo=`` for offset 0 so the API returns the page containing that image.
   * @returns {Promise<{ items: unknown[], total: number, limit: number, offset: number }>}
   */
  async function fetchPhotoItemsForSelection(offset, apiPhoto) {
    const params = new URLSearchParams();
    params.set("person_ids", selected.map((p) => p.person_id).join(","));
    const off = typeof offset === "number" && offset >= 0 ? offset : 0;
    params.set("offset", String(off));
    params.set("limit", String(PHOTO_PAGE_SIZE));
    const photoArg =
      off === 0 && apiPhoto != null && String(apiPhoto).trim()
        ? String(apiPhoto).trim()
        : "";
    if (photoArg) {
      params.set("photo", photoArg);
    }
    const url = PHOTOS_URL + "?" + params.toString();
    const res = await fetch(url, { credentials: "omit" });
    if (!res.ok) {
      let msg = "Request failed (" + res.status + ")";
      try {
        const errJson = await res.json();
        if (errJson && errJson.message) msg = String(errJson.message);
      } catch (_) {}
      throw new Error(msg);
    }
    const json = await res.json();
    const raw = json.data;
    if (!Array.isArray(raw)) throw new Error("Unexpected response shape");
    const total = typeof json.total === "number" ? json.total : raw.length;
    const limit = typeof json.limit === "number" ? json.limit : PHOTO_PAGE_SIZE;
    const offOut = typeof json.offset === "number" ? json.offset : off;
    const items = raw
      .map(function (x) {
        return normalizePhotoRow(x);
      })
      .filter(function (p) {
        return p.image && String(p.image).trim();
      });
    return { items: items, total: total, limit: limit, offset: offOut };
  }

  /**
   * @param {string} prefix
   * @param {number} [offset]
   * @param {string | null | undefined} [apiPhoto] — URL bootstrap only; see ``fetchPhotoItemsForSelection``.
   * @returns {Promise<{ items: unknown[], total: number, limit: number, offset: number }>}
   */
  async function fetchPhotoItemsForDocumentPrefix(prefix, offset, apiPhoto) {
    const p = normalizeDocumentPrefixForApi(String(prefix || ""));
    if (!p) throw new Error(DOCUMENT_ID_FORMAT_MESSAGE);
    const params = new URLSearchParams();
    params.set("document_prefix", p);
    const off = typeof offset === "number" && offset >= 0 ? offset : 0;
    params.set("offset", String(off));
    params.set("limit", String(PHOTO_PAGE_SIZE));
    const photoArg =
      off === 0 && apiPhoto != null && String(apiPhoto).trim()
        ? String(apiPhoto).trim()
        : "";
    if (photoArg) {
      params.set("photo", photoArg);
    }
    const url = PHOTOS_URL + "?" + params.toString();
    const res = await fetch(url, { credentials: "omit" });
    if (!res.ok) {
      let msg = "Request failed (" + res.status + ")";
      try {
        const errJson = await res.json();
        if (errJson && errJson.message) msg = String(errJson.message);
      } catch (_) {}
      throw new Error(msg);
    }
    const json = await res.json();
    const raw = json.data;
    if (!Array.isArray(raw)) throw new Error("Unexpected response shape");
    const total = typeof json.total === "number" ? json.total : raw.length;
    const limit = typeof json.limit === "number" ? json.limit : PHOTO_PAGE_SIZE;
    const offOut = typeof json.offset === "number" ? json.offset : off;
    const items = raw
      .map(function (x) {
        return normalizePhotoRow(x);
      })
      .filter(function (row) {
        return row.image && String(row.image).trim();
      });
    return { items: items, total: total, limit: limit, offset: offOut };
  }

  /**
   * @param {unknown[]} photoItems
   * @param {{ append?: boolean, indexOffset?: number, onReady?: () => void } | undefined} options
   * @returns {{ url: string, image: string, faces: unknown }[]}
   */
  function renderPhotoResults(photoItems, options) {
    const opts = options || {};
    const append = opts.append === true;
    const indexOffset = typeof opts.indexOffset === "number" ? opts.indexOffset : 0;
    const onReady =
      typeof opts.onReady === "function" ? opts.onReady : null;

    if (!append) {
      destroyPeopleMasonry();
      masonryEl.innerHTML = "";
    }

    if (!photoItems.length) {
      if (!append) {
        resultsWrap.hidden = false;
      }
      if (append && onReady) {
        onReady();
      }
      return [];
    }

    if (!append) {
      showPeopleResultsLoading(DEFAULT_RESULTS_LOADING_LABEL);
      masonryEl.classList.add("people-justified--pending");
    }

    const lightboxPayload = photoItems.map(function (p) {
      return {
        url: SiteShared.cdnImagesUrl(p.image),
        image: String(p.image),
        faces: p.faces,
      };
    });

    const elements = [];
    const frag = document.createDocumentFragment();
    photoItems.forEach(function (photo, idx) {
      const globalIdx = indexOffset + idx;
      const item = document.createElement("div");
      item.className = "people-justified-item";
      const img = document.createElement("img");
      const thumbSrc = SiteShared.cdnThumbnailWebpUrl(photo.image);
      const fullSrc = lightboxPayload[idx].url;
      img.src = thumbSrc;
      img.alt = "";
      img.loading = "eager";
      img.decoding = "async";
      if (idx < THUMB_FETCHPRIORITY_HIGH_COUNT) {
        img.fetchPriority = "high";
      }
      const wrap = document.createElement("div");
      wrap.className = "people-thumb-wrap";
      const bboxes = document.createElement("div");
      bboxes.className = "people-thumb-bboxes";
      wrap.appendChild(img);
      wrap.appendChild(bboxes);
      appendThumbFaceBoxes(bboxes, photo.faces);
      const a = document.createElement("a");
      a.href = fullSrc;
      a.addEventListener("click", function (e) {
        e.preventDefault();
        const acc =
          activeSearchTab === "people"
            ? lastPeoplePhotoItems
            : lastDocumentPhotoItems;
        if (!acc || !acc.length) return;
        openLightbox(buildLightboxPayloadFromItems(acc), globalIdx);
      });
      a.appendChild(wrap);
      item.appendChild(a);
      elements.push(item);
      frag.appendChild(item);
    });
    if (append) {
      const stage = getPeopleAppendStage();
      stage.innerHTML = "";
      stage.appendChild(frag);
    } else {
      masonryEl.appendChild(frag);
    }
    resultsWrap.hidden = false;
    ensureJustifiedResizeObserver();

    const onImagesReady = function () {
      const ratios = elements.map(function (el) {
        const img = el.querySelector("img");
        const iw = img && img.naturalWidth ? img.naturalWidth : 1;
        const ih = img && img.naturalHeight ? img.naturalHeight : 1;
        const r = iw / ih;
        return Number.isFinite(r) && r > 0 ? r : 1;
      });
      if (append && justifiedState && justifiedState.elements.length) {
        justifiedState.elements = justifiedState.elements.concat(elements);
        justifiedState.ratios = justifiedState.ratios.concat(ratios);
        const stage = getPeopleAppendStage();
        for (let i = 0; i < elements.length; i++) {
          stage.removeChild(elements[i]);
        }
      } else {
        justifiedState = { elements: elements, ratios: ratios };
      }
      layoutJustifiedFromState();
      if (typeof onReady === "function") {
        onReady();
      }
    };

    if (typeof imagesLoaded === "function") {
      imagesLoaded(elements, onImagesReady);
    } else {
      onImagesReady();
    }
    return lightboxPayload;
  }

  /** @type {{ person_id: string, name: string | null }[]} */
  let selected = [];
  /** @type {{ person_id: string, label: string }[]} */
  let nameIndex = [];
  /** Raw person_id -> name from API (value may be null). */
  let namesById = {};
  let namesLoaded = false;
  let activeIndex = -1;
  /** Index of option under pointer, or null — hides row-0 “Enter default” style when hovering another row. */
  let peopleSearchPointerOptionIndex = null;
  /** @type {{ url: string, image: string, faces: unknown }[]} */
  let lightboxPhotos = [];
  let lightboxIndex = -1;
  let lightboxTouchStartX = null;
  let lightboxTouchStartY = null;
  /** Element that had focus before the lightbox opened; restored on close so aria-hidden is not applied while focus remains inside. */
  let lightboxPreviousFocus = null;
  let lightboxZoomScale = 1;
  let lightboxZoomPanX = 0;
  let lightboxZoomPanY = 0;
  let lightboxPinchStartDistance = null;
  let lightboxPinchStartScale = 1;
  let lightboxPanPointerActive = false;
  let lightboxPanLastClientX = 0;
  let lightboxPanLastClientY = 0;
  /** True during pinch / pan; label positions follow affine map from frozen base coords (no placement re-solve). */
  let lightboxOverlayGestureActive = false;
  /**
   * @type {null | { verticalMode: string, gapScreen: number, hOffsetScreen: number, stacked: boolean, displayName: string }[]}
   */
  let lightboxLabelFrozenBase = null;

  function lightboxPinchZoomEnabled() {
    return (
      typeof window !== "undefined" &&
      window.matchMedia &&
      window.matchMedia("(max-width: " + LABEL_STACK_RETRY_MAX_WIDTH_PX + "px)").matches
    );
  }

  function resetLightboxZoom() {
    lightboxZoomScale = 1;
    lightboxZoomPanX = 0;
    lightboxZoomPanY = 0;
    lightboxPinchStartDistance = null;
    lightboxPanPointerActive = false;
    lightboxOverlayGestureActive = false;
    lightboxLabelFrozenBase = null;
    if (lightboxZoomEl) {
      lightboxZoomEl.style.transform = "";
      lightboxZoomEl.style.transformOrigin = "";
    }
    if (lightboxEl) {
      lightboxEl.classList.remove("people-lightbox--zoomed");
    }
    if (lightboxStageEl) {
      lightboxStageEl.classList.remove("people-lightbox-stage--pinch-zoom");
    }
  }

  /**
   * Map pre-zoom overlay coords (same origin as getContainedImageRect) to screen — matches CSS on #people-lightbox-zoom.
   * Pass pinchActive from renderLightboxFaceBoxes to avoid repeated matchMedia.
   */
  function mapLightboxZoomCoordX(x, ox, oy, dw, dh, pinchActive) {
    const use =
      arguments.length > 5 ? pinchActive : lightboxPinchZoomEnabled();
    if (!use) return x;
    const cx = ox + dw / 2;
    return lightboxZoomPanX + cx + lightboxZoomScale * (x - cx);
  }

  function mapLightboxZoomCoordY(y, ox, oy, dw, dh, pinchActive) {
    const use =
      arguments.length > 5 ? pinchActive : lightboxPinchZoomEnabled();
    if (!use) return y;
    const cy = oy + dh / 2;
    return lightboxZoomPanY + cy + lightboxZoomScale * (y - cy);
  }

  /**
   * Snapshot label placement. Vertical: ``gapScreen`` = screen px between box edge and label edge.
   * Horizontal: ``hOffsetScreen`` = ``labelLeft − boxLeft`` in screen px (parallel to vertical).
   * Each frame we recompute mapped ``bL`` / ``bT`` / ``bH`` then apply those offsets (no invert/map).
   */
  function captureLightboxLabelFreezeFromDom() {
    if (!lightboxPinchZoomEnabled() || !lightboxBboxesEl) return;
    const boxes = lightboxBboxesEl.querySelectorAll(".people-face-box");
    const labels = lightboxBboxesEl.querySelectorAll(".people-face-label");
    if (!labels.length || boxes.length !== labels.length) {
      lightboxLabelFrozenBase = null;
      return;
    }
    const out = [];
    for (let i = 0; i < labels.length; i++) {
      const boxEl = boxes[i];
      const labelEl = labels[i];
      const bL = parseFloat(boxEl.style.left) || 0;
      const bT = parseFloat(boxEl.style.top) || 0;
      const bW = parseFloat(boxEl.style.width) || 0;
      const bH = parseFloat(boxEl.style.height) || 0;
      const lL = parseFloat(labelEl.style.left) || 0;
      const lT = parseFloat(labelEl.style.top) || 0;
      const lH = labelEl.offsetHeight;
      const hOffsetScreen = lL - bL;
      const boxBottom = bT + bH;
      const labelBottom = lT + lH;
      const boxMidY = bT + bH / 2;
      const labelMidY = lT + lH / 2;
      let verticalMode;
      let gapScreen;
      if (labelMidY < boxMidY) {
        verticalMode = "above";
        gapScreen = bT - labelBottom;
      } else {
        verticalMode = "below";
        gapScreen = lT - boxBottom;
      }
      const pid = String(labelEl.getAttribute("data-person-id") || "");
      const displayName = displayNameForPersonId(pid);
      const stacked = labelEl.classList.contains("people-face-label--stacked");
      out.push({
        verticalMode: verticalMode,
        gapScreen: gapScreen,
        hOffsetScreen: hOffsetScreen,
        stacked: stacked,
        displayName: displayName,
      });
    }
    lightboxLabelFrozenBase = out;
  }

  function clearLightboxGestureFreezeAndRelayout() {
    lightboxOverlayGestureActive = false;
    lightboxLabelFrozenBase = null;
    if (!lightboxEl.hidden) renderLightboxFaceBoxes();
  }

  /**
   * Keep the scaled bitmap overlapping the img box (same coord system as getContainedImageRect).
   * Uses cw/ch so bounds match mapLightboxZoomCoord* / overlays. Strength: LIGHTBOX_PAN_CLAMP_INSET_FRACTION only.
   */
  function clampLightboxZoomPanToImage(ox, oy, dw, dh, cw, ch) {
    if (!(cw > 0 && ch > 0 && dw > 0 && dh > 0)) return;
    const s = lightboxZoomScale;
    const cx = ox + dw / 2;
    const cy = oy + dh / 2;
    const leftK = cx + s * (ox - cx);
    const rightK = cx + s * (ox + dw - cx);
    const topK = cy + s * (oy - cy);
    const botK = cy + s * (oy + dh - cy);
    function clampPanAxis(pan, dim, span, edgeLo, edgeHi) {
      let inset = dim * LIGHTBOX_PAN_CLAMP_INSET_FRACTION;
      const maxInset = (dim + span) / 2 - 0.5;
      if (inset > maxInset) {
        inset = Math.max(0, maxInset);
      }
      return Math.min(dim - inset - edgeLo, Math.max(inset - edgeHi, pan));
    }
    lightboxZoomPanX = clampPanAxis(lightboxZoomPanX, cw, s * dw, leftK, rightK);
    lightboxZoomPanY = clampPanAxis(lightboxZoomPanY, ch, s * dh, topK, botK);
  }

  function applyLightboxZoomStyle(ox, oy, dw, dh, cw, ch) {
    if (!lightboxZoomEl) return;
    if (!lightboxPinchZoomEnabled()) {
      lightboxZoomEl.style.transform = "";
      lightboxZoomEl.style.transformOrigin = "";
      return;
    }
    clampLightboxZoomPanToImage(ox, oy, dw, dh, cw, ch);
    const cx = ox + dw / 2;
    const cy = oy + dh / 2;
    lightboxZoomEl.style.transformOrigin = cx + "px " + cy + "px";
    lightboxZoomEl.style.transform =
      "translate(" + lightboxZoomPanX + "px," + lightboxZoomPanY + "px) scale(" + lightboxZoomScale + ")";
    const zoomed = lightboxZoomScale > 1.001;
    lightboxEl.classList.toggle("people-lightbox--zoomed", zoomed);
    lightboxStageEl.classList.toggle("people-lightbox-stage--pinch-zoom", zoomed);
  }

  function lightboxTouchDistance(a, b) {
    const dx = a.clientX - b.clientX;
    const dy = a.clientY - b.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function updateLightboxMeta(item, totalCount) {
    lightboxCountEl.textContent = (lightboxIndex + 1) + " / " + totalCount;
    lightboxFilenameEl.textContent = item.image || "";
    const pdfUrl = buildOriginalPdfUrl(item.image);
    lightboxPdfLinkEl.href = pdfUrl || "#";
    lightboxPdfLinkEl.hidden = !pdfUrl;
  }

  function resetLightboxMeta() {
    lightboxCountEl.textContent = "";
    lightboxFilenameEl.textContent = "";
    lightboxPdfLinkEl.href = "#";
    lightboxPdfLinkEl.hidden = true;
  }

  function renderLightboxImage() {
    if (!lightboxPhotos.length || lightboxIndex < 0) return;
    resetLightboxZoom();
    const item = lightboxPhotos[lightboxIndex];
    updateLightboxMeta(item, lightboxPhotos.length);
    syncPhotoQueryToUrl(item.image || null);

    function applyFacesWhenReady() {
      if (lightboxImgEl.naturalWidth && lightboxImgEl.naturalHeight) {
        renderLightboxFaceBoxes();
      }
    }

    lightboxImgEl.onload = function () {
      applyFacesWhenReady();
    };
    lightboxImgEl.src = item.url;
    if (lightboxImgEl.complete) {
      applyFacesWhenReady();
    } else {
      lightboxBboxesEl.innerHTML = "";
    }
  }

  function openLightbox(photos, index) {
    if (!Array.isArray(photos) || !photos.length) return;
    lightboxPreviousFocus =
      document.activeElement instanceof HTMLElement ? document.activeElement : null;
    lightboxPhotos = photos.slice();
    lightboxIndex = Math.max(0, Math.min(index, lightboxPhotos.length - 1));
    lightboxBboxesEl.innerHTML = "";
    if (lightboxResizeObserver && lightboxStageEl) {
      lightboxResizeObserver.disconnect();
      lightboxResizeObserver = null;
    }
    renderLightboxImage();
    lightboxEl.hidden = false;
    lightboxEl.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    if (typeof ResizeObserver !== "undefined" && lightboxStageEl) {
      lightboxResizeObserver = new ResizeObserver(function () {
        if (!lightboxEl.hidden) {
          lightboxOverlayGestureActive = false;
          lightboxLabelFrozenBase = null;
          renderLightboxFaceBoxes();
        }
      });
      lightboxResizeObserver.observe(lightboxStageEl);
    }
  }

  function closeLightbox() {
    if (lightboxResizeObserver) {
      lightboxResizeObserver.disconnect();
      lightboxResizeObserver = null;
    }
    const prev = lightboxPreviousFocus;
    lightboxPreviousFocus = null;
    if (prev && document.body.contains(prev) && typeof prev.focus === "function") {
      try {
        prev.focus({ preventScroll: true });
      } catch (_) {
        /* ignore */
      }
    }
    const ae = document.activeElement;
    if (ae && lightboxEl.contains(ae)) {
      ae.blur();
    }
    lightboxEl.hidden = true;
    lightboxEl.setAttribute("aria-hidden", "true");
    lightboxImgEl.src = "";
    lightboxImgEl.onload = null;
    lightboxBboxesEl.innerHTML = "";
    resetLightboxZoom();
    resetLightboxMeta();
    lightboxPhotos = [];
    lightboxIndex = -1;
    lightboxTouchStartX = null;
    lightboxTouchStartY = null;
    syncPhotoQueryToUrl(null);
    document.body.style.overflow = "";
  }

  function showPrevLightboxImage() {
    if (!lightboxPhotos.length) return;
    lightboxIndex = (lightboxIndex - 1 + lightboxPhotos.length) % lightboxPhotos.length;
    renderLightboxImage();
  }

  function showNextLightboxImage() {
    if (!lightboxPhotos.length) return;
    lightboxIndex = (lightboxIndex + 1) % lightboxPhotos.length;
    renderLightboxImage();
  }

  function navigateLightbox(direction) {
    if (direction === "prev") {
      showPrevLightboxImage();
      return;
    }
    if (direction === "next") {
      showNextLightboxImage();
      return;
    }
    if (direction === "close") {
      closeLightbox();
    }
  }

  function onLightboxTouchStart(e) {
    if (lightboxEl.hidden) return;
    if (lightboxPinchZoomEnabled() && e.touches && e.touches.length === 2) {
      lightboxPinchStartDistance = lightboxTouchDistance(e.touches[0], e.touches[1]);
      lightboxPinchStartScale = lightboxZoomScale;
      lightboxPanPointerActive = false;
      lightboxTouchStartX = null;
      lightboxTouchStartY = null;
      lightboxOverlayGestureActive = true;
      captureLightboxLabelFreezeFromDom();
      return;
    }
    if (lightboxPinchZoomEnabled() && lightboxZoomScale > 1.01 && e.touches && e.touches.length === 1) {
      lightboxPanPointerActive = true;
      lightboxPanLastClientX = e.touches[0].clientX;
      lightboxPanLastClientY = e.touches[0].clientY;
      lightboxTouchStartX = null;
      lightboxTouchStartY = null;
      lightboxOverlayGestureActive = true;
      captureLightboxLabelFreezeFromDom();
      return;
    }
    if (!e.touches || e.touches.length !== 1) {
      lightboxTouchStartX = null;
      lightboxTouchStartY = null;
      return;
    }
    lightboxTouchStartX = e.touches[0].clientX;
    lightboxTouchStartY = e.touches[0].clientY;
  }

  function onLightboxTouchMove(e) {
    if (lightboxEl.hidden) return;
    if (!lightboxPinchZoomEnabled()) return;
    if (lightboxPinchStartDistance != null && e.touches && e.touches.length >= 2) {
      const d = lightboxTouchDistance(e.touches[0], e.touches[1]);
      if (d > 0 && lightboxPinchStartDistance > 0) {
        const next = lightboxPinchStartScale * (d / lightboxPinchStartDistance);
        lightboxZoomScale = Math.max(LIGHTBOX_ZOOM_MIN, Math.min(LIGHTBOX_ZOOM_MAX, next));
        renderLightboxFaceBoxes();
      }
      e.preventDefault();
      return;
    }
    if (lightboxPanPointerActive && e.touches && e.touches.length === 1) {
      const x = e.touches[0].clientX;
      const y = e.touches[0].clientY;
      lightboxZoomPanX += x - lightboxPanLastClientX;
      lightboxZoomPanY += y - lightboxPanLastClientY;
      lightboxPanLastClientX = x;
      lightboxPanLastClientY = y;
      renderLightboxFaceBoxes();
      e.preventDefault();
    }
  }

  function onLightboxTouchEnd(e) {
    if (lightboxPinchZoomEnabled()) {
      if (!e.touches || e.touches.length < 2) {
        lightboxPinchStartDistance = null;
      }
      if (!e.touches || e.touches.length === 0) {
        lightboxPanPointerActive = false;
        if (lightboxOverlayGestureActive) {
          clearLightboxGestureFreezeAndRelayout();
        }
      }
    }
    if (lightboxEl.hidden) return;
    if (lightboxPinchZoomEnabled() && lightboxZoomScale > 1.01) {
      lightboxTouchStartX = null;
      lightboxTouchStartY = null;
      return;
    }
    if (lightboxTouchStartX == null || lightboxTouchStartY == null) return;
    if (!e.changedTouches || !e.changedTouches.length) return;
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const dx = endX - lightboxTouchStartX;
    const dy = endY - lightboxTouchStartY;
    lightboxTouchStartX = null;
    lightboxTouchStartY = null;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (absDx < 40 || absDx <= absDy) return;
    navigateLightbox(dx < 0 ? "next" : "prev");
  }

  function setStatus(msg, isError) {
    statusEl.textContent = msg || "";
    statusEl.classList.toggle("people-status-error", !!isError);
  }

  function setStatusHtml(html, isError) {
    statusEl.innerHTML = html || "";
    statusEl.classList.toggle("people-status-error", !!isError);
  }

  function setStatusError(err) {
    setStatus(String((err && err.message) || err), true);
  }

  function setActiveSearchTab(tab, opts) {
    const o = opts || {};
    if (tab === activeSearchTab && !o.force) return;
    if (!o.skipPersist) persistTabState(activeSearchTab);
    activeSearchTab = tab;
    syncTabUiOnly(tab);
    if (!o.skipRestore) {
      restoreTabState(tab);
    } else {
      updateSearchButton();
    }
    if (!o.skipUrl) {
      applyUrlForCurrentTab();
    }
  }

  function updateDocumentValidationUi() {
    if (!documentInputEl) return;
    if (activeSearchTab !== "document") {
      if (documentValidationEl) {
        documentValidationEl.hidden = true;
        documentValidationEl.textContent = "";
      }
      documentInputEl.removeAttribute("aria-invalid");
      documentInputEl.classList.remove("people-search-input--invalid");
      return;
    }
    const raw = String(documentInputEl.value || "").trim();
    if (!raw) {
      if (documentValidationEl) {
        documentValidationEl.hidden = true;
        documentValidationEl.textContent = "";
      }
      documentInputEl.removeAttribute("aria-invalid");
      documentInputEl.classList.remove("people-search-input--invalid");
      return;
    }
    if (!SiteShared.isValidPartialDocumentQuery(raw)) {
      if (documentValidationEl) {
        documentValidationEl.hidden = false;
        documentValidationEl.textContent = DOCUMENT_ID_FORMAT_MESSAGE;
      }
      documentInputEl.setAttribute("aria-invalid", "true");
      documentInputEl.classList.add("people-search-input--invalid");
      return;
    }
    if (documentValidationEl) {
      documentValidationEl.hidden = true;
      documentValidationEl.textContent = "";
    }
    documentInputEl.removeAttribute("aria-invalid");
    documentInputEl.classList.remove("people-search-input--invalid");
  }

  function updateSearchButton() {
    updateDocumentValidationUi();
    if (activeSearchTab === "document") {
      const raw = String(documentInputEl && documentInputEl.value ? documentInputEl.value : "").trim();
      searchBtn.disabled =
        !raw || !SiteShared.isValidPartialDocumentQuery(raw);
    } else {
      searchBtn.disabled = selected.length === 0;
    }
  }

  function graphUrlForSelectedPeople() {
    const ids = selected.map((p) => String(p.person_id || "").trim()).filter(Boolean);
    if (ids.length === 1) {
      const params = new URLSearchParams();
      params.set("person_id", ids[0]);
      return "/?" + params.toString();
    }
    if (ids.length === 2) {
      const params = new URLSearchParams();
      params.set("person_ids", ids.join(","));
      return "/?" + params.toString();
    }
    return null;
  }

  function updateOpenGraphButton() {
    if (!openGraphBtn) return;
    const count = selected.length;
    const enabled = count === 1 || count === 2;
    openGraphBtn.disabled = !enabled;
    if (enabled) {
      openGraphBtn.title = count === 1
        ? "Open graph focused on this person"
        : "Open graph focused on this edge";
    } else if (count === 0) {
      openGraphBtn.title = "Select 1 or 2 people to open in graph";
    } else {
      openGraphBtn.title = "'Open in graph' supports 1 person (node) or 2 people (edge)";
    }
  }

  function renderSelected() {
    selectedEl.innerHTML = "";
    selected.forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "people-chip";
      card.setAttribute("data-person-id", p.person_id);
      const accent = PERSON_COLOR_PALETTE[i % PERSON_COLOR_PALETTE.length];
      card.style.border = "2px solid " + accent;
      card.style.background = chipBackgroundTint(accent);
      card.style.color = "#1a1a1a";
      const label = document.createElement("span");
      label.className = "people-chip-label";
      label.textContent = chipLabelForSelected(p);
      const rm = document.createElement("button");
      rm.type = "button";
      rm.className = "people-chip-remove";
      rm.setAttribute("aria-label", "Remove " + chipLabelForSelected(p));
      rm.textContent = "×";
      rm.addEventListener("click", () => {
        selected.splice(i, 1);
        renderSelected();
        updateSearchButton();
        clearSearchResults();
      });
      card.appendChild(label);
      card.appendChild(rm);
      selectedEl.appendChild(card);
    });
    updateSearchButton();
    updateOpenGraphButton();
  }

  function buildIndex(dataObj) {
    namesById = dataObj || {};
    nameIndex = Object.keys(namesById).map((person_id) => {
      const n = namesById[person_id];
      const label = n != null && String(n).trim() ? String(n).trim() : person_id;
      return { person_id, label };
    });
    nameIndex.sort((a, b) => a.label.localeCompare(b.label, undefined, { sensitivity: "base" }));
  }

  function readNamesCache() {
    try {
      const raw = window.localStorage.getItem(PEOPLE_NAMES_CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return null;
      if (typeof parsed.ts !== "number") return null;
      if (!parsed.data || typeof parsed.data !== "object") return null;
      if (Date.now() - parsed.ts > PEOPLE_NAMES_CACHE_TTL_MS) return null;
      return parsed.data;
    } catch (_) {
      return null;
    }
  }

  function writeNamesCache(dataObj) {
    try {
      window.localStorage.setItem(
        PEOPLE_NAMES_CACHE_KEY,
        JSON.stringify({ ts: Date.now(), data: dataObj })
      );
    } catch (_) {
      // Ignore localStorage errors (quota/private mode/etc).
    }
  }

  async function loadNames(options) {
    if (namesLoaded) return;
    const opts = options || {};
    const cached = readNamesCache();
    if (cached) {
      buildIndex(cached);
      namesLoaded = true;
      return;
    }
    if (!opts.silent) setStatus("Loading names…");
    const res = await fetchPeopleNamesJson();
    if (!res.ok) throw new Error("Failed to load people (" + res.status + ")");
    const json = await res.json();
    const data = json.data;
    if (!data || typeof data !== "object") throw new Error("Unexpected response from /people/names");
    buildIndex(data);
    writeNamesCache(data);
    namesLoaded = true;
    if (!opts.silent) setStatus("");
  }

  function filterMatches(q) {
    const query = (q || "").trim().toLowerCase();
    if (!query) return [];
    return nameIndex.filter(
      (row) =>
        row.label.toLowerCase().includes(query) || row.person_id.toLowerCase().includes(query)
    ).slice(0, 40);
  }

  function setListboxOpen(isOpen) {
    listboxEl.hidden = !isOpen;
    inputEl.setAttribute("aria-expanded", isOpen ? "true" : "false");
    if (!isOpen) {
      inputEl.removeAttribute("aria-activedescendant");
      activeIndex = -1;
      peopleSearchPointerOptionIndex = null;
    }
  }

  function syncPeopleSearchListboxHighlight() {
    const opts = listboxEl.querySelectorAll(".people-search-option");
    if (!opts.length) return;
    opts.forEach((el, i) => {
      const keyboardOn = activeIndex >= 0 && i === activeIndex;
      const enterDefault =
        activeIndex < 0 &&
        i === 0 &&
        (peopleSearchPointerOptionIndex === null || peopleSearchPointerOptionIndex === 0);
      el.classList.toggle("people-search-option-active", keyboardOn);
      el.classList.toggle("people-search-option-enter-default", enterDefault);
      const ariaSel = keyboardOn || enterDefault;
      el.setAttribute("aria-selected", ariaSel ? "true" : "false");
    });
    if (activeIndex >= 0) {
      inputEl.setAttribute("aria-activedescendant", "people-opt-" + activeIndex);
    } else if (
      peopleSearchPointerOptionIndex === null ||
      peopleSearchPointerOptionIndex === 0
    ) {
      inputEl.setAttribute("aria-activedescendant", "people-opt-0");
    } else {
      inputEl.removeAttribute("aria-activedescendant");
    }
  }

  function renderListbox(matches) {
    listboxEl.innerHTML = "";
    if (!matches.length) {
      setListboxOpen(false);
      activeIndex = -1;
      return;
    }
    matches.forEach((row, i) => {
      const li = document.createElement("li");
      li.setAttribute("role", "option");
      li.id = "people-opt-" + i;
      li.dataset.personId = row.person_id;
      li.className = "people-search-option";
      li.textContent = row.label;
      li.addEventListener("mousedown", (e) => {
        e.preventDefault();
        pickPerson(row.person_id);
      });
      listboxEl.appendChild(li);
    });
    setListboxOpen(true);
    activeIndex = -1;
    peopleSearchPointerOptionIndex = null;
    syncPeopleSearchListboxHighlight();
  }

  function pickPerson(person_id) {
    if (selected.some((p) => p.person_id === person_id)) return;
    const raw = namesById[person_id];
    const name =
      raw != null && String(raw).trim() ? String(raw).trim() : null;
    selected.push({ person_id, name });
    inputEl.value = "";
    setListboxOpen(false);
    renderSelected();
  }

  function getSelectedPersonIds() {
    return selected.map((p) => p.person_id);
  }

  function syncPeopleQueryToUrl() {
    const params = new URLSearchParams(window.location.search);
    params.set("tab", "people");
    params.delete("document");
    const ids = getSelectedPersonIds();
    if (ids.length) {
      params.set("person_ids", ids.join(","));
    } else {
      params.delete("person_ids");
    }
    const qs = params.toString();
    const nextUrl =
      window.location.pathname +
      (qs ? "?" + qs : "") +
      window.location.hash;
    window.history.replaceState(null, "", nextUrl);
  }

  function syncDocumentQueryToUrl(prefix) {
    const params = new URLSearchParams(window.location.search);
    params.set("tab", "document");
    params.delete("person_ids");
    const doc = String(prefix || "").trim();
    if (doc) {
      params.set("document", doc);
    } else {
      params.delete("document");
    }
    const qs = params.toString();
    const nextUrl =
      window.location.pathname +
      (qs ? "?" + qs : "") +
      window.location.hash;
    window.history.replaceState(null, "", nextUrl);
  }

  function syncPhotoQueryToUrl(photoFilename) {
    const params = new URLSearchParams(window.location.search);
    params.set("tab", activeSearchTab === "document" ? "document" : "people");
    const photo = String(photoFilename || "").trim();
    if (photo) {
      params.set("photo", photo);
    } else {
      params.delete("photo");
    }
    const qs = params.toString();
    const nextUrl =
      window.location.pathname +
      (qs ? "?" + qs : "") +
      window.location.hash;
    window.history.replaceState(null, "", nextUrl);
  }

  inputEl.addEventListener("input", () => {
    if (!namesLoaded) return;
    renderListbox(filterMatches(inputEl.value));
  });

  inputEl.addEventListener("focus", async () => {
    try {
      await loadNames();
      renderListbox(filterMatches(inputEl.value));
    } catch (e) {
      setStatusError(e);
    }
  });

  listboxEl.addEventListener(
    "pointerover",
    function (e) {
      const li = e.target && e.target.closest && e.target.closest(".people-search-option");
      if (!li || !listboxEl.contains(li)) return;
      const opts = listboxEl.querySelectorAll(".people-search-option");
      const idx = Array.prototype.indexOf.call(opts, li);
      peopleSearchPointerOptionIndex = idx >= 0 ? idx : null;
      syncPeopleSearchListboxHighlight();
    },
    true
  );
  listboxEl.addEventListener("pointerleave", function () {
    peopleSearchPointerOptionIndex = null;
    syncPeopleSearchListboxHighlight();
  });

  inputEl.addEventListener("keydown", (e) => {
    const opts = listboxEl.querySelectorAll(".people-search-option");
    const hasTypedQuery = String(inputEl.value || "").trim().length > 0;
    if (!opts.length) return;
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      e.preventDefault();
      if (e.key === "ArrowDown") {
        if (activeIndex < 0) {
          activeIndex = opts.length > 1 ? 1 : 0;
        } else {
          activeIndex = Math.min(activeIndex + 1, opts.length - 1);
        }
      } else {
        activeIndex = activeIndex <= 0 ? -1 : activeIndex - 1;
      }
      syncPeopleSearchListboxHighlight();
      return;
    }
    if (e.key === "Enter" && hasTypedQuery) {
      e.preventDefault();
      const pickedIndex = activeIndex >= 0 ? activeIndex : 0;
      pickPerson(opts[pickedIndex].dataset.personId);
      return;
    }
    if (e.key === "Escape") setListboxOpen(false);
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".people-autocomplete")) setListboxOpen(false);
  });

  lightboxCloseBtn.addEventListener("click", () => navigateLightbox("close"));
  lightboxPrevBtn.addEventListener("click", () => navigateLightbox("prev"));
  lightboxNextBtn.addEventListener("click", () => navigateLightbox("next"));
  lightboxStageEl.addEventListener("touchstart", onLightboxTouchStart, { passive: true });
  lightboxStageEl.addEventListener("touchmove", onLightboxTouchMove, { passive: false });
  lightboxStageEl.addEventListener("touchend", onLightboxTouchEnd, { passive: true });
  lightboxStageEl.addEventListener("touchcancel", function () {
    lightboxTouchStartX = null;
    lightboxTouchStartY = null;
    lightboxPinchStartDistance = null;
    lightboxPanPointerActive = false;
    if (lightboxPinchZoomEnabled() && lightboxOverlayGestureActive) {
      clearLightboxGestureFreezeAndRelayout();
    }
  }, { passive: true });
  lightboxEl.addEventListener("click", (e) => {
    if (e.target === lightboxEl) navigateLightbox("close");
  });
  document.addEventListener("keydown", (e) => {
    if (lightboxEl.hidden) return;
    const direction = e.key === "Escape"
      ? "close"
      : e.key === "ArrowLeft"
        ? "prev"
        : e.key === "ArrowRight"
          ? "next"
          : null;
    if (!direction) return;
    e.preventDefault();
    navigateLightbox(direction);
  });

  window.addEventListener("resize", function () {
    if (!lightboxEl.hidden) {
      lightboxOverlayGestureActive = false;
      lightboxLabelFrozenBase = null;
      renderLightboxFaceBoxes();
    }
    if (!justifiedState) return;
    clearTimeout(masonryResizeTimer);
    masonryResizeTimer = setTimeout(function () {
      layoutJustifiedFromState();
    }, 150);
  });

  async function runPeopleSearch(options) {
    const opts = options || {};
    const shouldSyncUrl = opts.syncUrl !== false;
    const preferredPhoto = String(opts.preferredPhoto || "").trim();
    const apiPhoto =
      opts.apiPhoto != null && String(opts.apiPhoto).trim()
        ? String(opts.apiPhoto).trim()
        : null;
    if (!selected.length) return;
    if (shouldSyncUrl) {
      syncPeopleQueryToUrl();
    }
    if (!preferredPhoto) {
      syncPhotoQueryToUrl(null);
    }
    setStatus("Searching…");
    prepareResultsSearchUi();
    try {
      const { items: photoItems, total, offset: pageOffset } =
        await fetchPhotoItemsForSelection(0, apiPhoto);
      if (!photoItems.length) {
        setNoImagesContentPolicyStatus();
        lastPeoplePhotoItems = null;
        peopleState.photoItems = null;
        peopleState.photoTotal = typeof total === "number" ? total : 0;
        peopleState.photoListStartOffset = null;
        peopleState.statusSnapshot = captureStatusSnapshot();
        updateLoadMoreButton(peopleState.photoTotal, 0);
        return;
      }
      lastPeoplePhotoItems = photoItems.slice();
      peopleState.photoItems = lastPeoplePhotoItems;
      peopleState.photoTotal = total;
      peopleState.photoListStartOffset =
        typeof pageOffset === "number" && pageOffset >= 0 ? pageOffset : 0;
      const lightboxPayload = renderPhotoResults(photoItems, {
        onReady: function () {
          updateLoadMoreButton(total, lastPeoplePhotoItems.length);
        },
      });
      setResultsHeadingForPeopleSelection();
      openLightboxIfPreferred(lightboxPayload, preferredPhoto);
      setStatusPhotoRange(
        total,
        lastPeoplePhotoItems.length,
        peopleState.photoListStartOffset ?? 0
      );
      peopleState.statusSnapshot = captureStatusSnapshot();
    } catch (e) {
      resetResultsHeading();
      setStatusError(e);
    }
  }

  async function runDocumentSearch(options) {
    const opts = options || {};
    const shouldSyncUrl = opts.syncUrl !== false;
    const preferredPhoto = String(opts.preferredPhoto || "").trim();
    const rawInput = String(
      opts.documentPrefix != null && opts.documentPrefix !== ""
        ? opts.documentPrefix
        : documentInputEl
          ? documentInputEl.value
          : ""
    ).trim();
    if (!rawInput) return;
    if (!SiteShared.isValidPartialDocumentQuery(rawInput)) {
      updateDocumentValidationUi();
      setStatus("", false);
      return;
    }
    const normalized = rawInput.trim().toUpperCase();
    if (documentInputEl && documentInputEl.value.trim().toUpperCase() !== normalized) {
      documentInputEl.value = normalized;
    }
    updateDocumentValidationUi();
    try {
      await loadNames({ silent: true });
    } catch (e) {
      setStatusError(e);
      return;
    }
    if (shouldSyncUrl) {
      syncDocumentQueryToUrl(normalized);
    }
    if (!preferredPhoto) {
      syncPhotoQueryToUrl(null);
    }
    const apiPhoto =
      opts.apiPhoto != null && String(opts.apiPhoto).trim()
        ? String(opts.apiPhoto).trim()
        : null;
    setStatus("Searching…");
    prepareResultsSearchUi();
    try {
      const { items: photoItems, total, offset: pageOffset } =
        await fetchPhotoItemsForDocumentPrefix(normalized, 0, apiPhoto);
      if (!photoItems.length) {
        setNoImagesContentPolicyStatus();
        lastDocumentPhotoItems = null;
        documentState.photoItems = null;
        documentState.photoTotal = typeof total === "number" ? total : 0;
        documentState.photoListStartOffset = null;
        documentState.input = normalized;
        documentState.statusSnapshot = captureStatusSnapshot();
        updateLoadMoreButton(documentState.photoTotal, 0);
        return;
      }
      lastDocumentPhotoItems = photoItems.slice();
      documentState.photoItems = lastDocumentPhotoItems;
      documentState.photoTotal = total;
      documentState.input = normalized;
      documentState.photoListStartOffset =
        typeof pageOffset === "number" && pageOffset >= 0 ? pageOffset : 0;
      const lightboxPayload = renderPhotoResults(photoItems, {
        onReady: function () {
          updateLoadMoreButton(total, lastDocumentPhotoItems.length);
        },
      });
      setResultsHeadingForDocumentPrefix(normalized);
      openLightboxIfPreferred(lightboxPayload, preferredPhoto);
      setStatusPhotoRange(
        total,
        lastDocumentPhotoItems.length,
        documentState.photoListStartOffset ?? 0
      );
      documentState.statusSnapshot = captureStatusSnapshot();
    } catch (e) {
      resetResultsHeading();
      setStatusError(e);
    }
  }

  async function runSearch(options) {
    const opts = options || {};
    const mode = opts.mode || activeSearchTab;
    if (mode === "document") {
      return runDocumentSearch(opts);
    }
    return runPeopleSearch(opts);
  }

  async function loadMorePhotos() {
    if (!loadMoreBtn || loadMoreBtn.disabled) return;
    const tab = activeSearchTab;
    const prev =
      tab === "people" ? lastPeoplePhotoItems : lastDocumentPhotoItems;
    if (!prev || !prev.length) return;
    const offset = prev.length;
    loadMoreBtn.disabled = true;
    showPeopleResultsLoading(LOAD_MORE_LOADING_LABEL);
    try {
      if (tab === "people") {
        const { items, total } = await fetchPhotoItemsForSelection(offset);
        if (!items.length) {
          hidePeopleResultsLoading();
          updateLoadMoreButton(
            typeof peopleState.photoTotal === "number"
              ? peopleState.photoTotal
              : total,
            prev.length
          );
          loadMoreBtn.disabled = false;
          return;
        }
        lastPeoplePhotoItems = prev.concat(items);
        peopleState.photoItems = lastPeoplePhotoItems;
        peopleState.photoTotal = total;
        renderPhotoResults(items, {
          append: true,
          indexOffset: offset,
          onReady: function () {
            setStatusPhotoRange(
              total,
              lastPeoplePhotoItems.length,
              peopleState.photoListStartOffset ?? 0
            );
            updateLoadMoreButton(total, lastPeoplePhotoItems.length);
            peopleState.statusSnapshot = captureStatusSnapshot();
            hidePeopleResultsLoading();
            loadMoreBtn.disabled = false;
          },
        });
      } else {
        const normalized = documentInputEl
          ? normalizeDocumentPrefixForApi(documentInputEl.value)
          : "";
        if (!normalized) {
          hidePeopleResultsLoading();
          loadMoreBtn.disabled = false;
          return;
        }
        const { items, total } = await fetchPhotoItemsForDocumentPrefix(
          normalized,
          offset
        );
        if (!items.length) {
          hidePeopleResultsLoading();
          updateLoadMoreButton(
            typeof documentState.photoTotal === "number"
              ? documentState.photoTotal
              : total,
            prev.length
          );
          loadMoreBtn.disabled = false;
          return;
        }
        lastDocumentPhotoItems = prev.concat(items);
        documentState.photoItems = lastDocumentPhotoItems;
        documentState.photoTotal = total;
        renderPhotoResults(items, {
          append: true,
          indexOffset: offset,
          onReady: function () {
            setStatusPhotoRange(
              total,
              lastDocumentPhotoItems.length,
              documentState.photoListStartOffset ?? 0
            );
            updateLoadMoreButton(total, lastDocumentPhotoItems.length);
            documentState.statusSnapshot = captureStatusSnapshot();
            hidePeopleResultsLoading();
            loadMoreBtn.disabled = false;
          },
        });
      }
    } catch (e) {
      hidePeopleResultsLoading();
      loadMoreBtn.disabled = false;
      setStatusError(e);
    }
  }

  searchBtn.addEventListener("click", async () => {
    await runSearch({ syncUrl: true });
  });

  if (loadMoreBtn) {
    loadMoreBtn.addEventListener("click", function () {
      loadMorePhotos();
    });
  }

  if (tabPeopleBtn) {
    tabPeopleBtn.addEventListener("click", function () {
      setActiveSearchTab("people");
    });
  }
  if (tabDocumentBtn) {
    tabDocumentBtn.addEventListener("click", function () {
      setActiveSearchTab("document");
    });
  }
  if (documentInputEl) {
    documentInputEl.addEventListener("input", updateSearchButton);
    documentInputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        runSearch({ syncUrl: true, mode: "document" });
      }
    });
  }

  openGraphBtn.addEventListener("click", function () {
    const url = graphUrlForSelectedPeople();
    if (!url) return;
    const helper = window.SiteShared;
    if (helper && typeof helper.openInNewTab === "function") {
      helper.openInNewTab(url);
      return;
    }
    window.open(url, "_blank", "noopener,noreferrer");
  });

  async function initFromQueryString() {
    const params = new URLSearchParams(window.location.search);
    const tabParam = (params.get("tab") || "").toLowerCase();
    const docRaw = String(params.get("document") || "").trim();
    const photoFromQuery = String(params.get("photo") || "").trim();
    const personIdsRaw = params.get("person_ids");

    if (docRaw) {
      const norm = normalizeDocumentPrefixForApi(docRaw);
      if (norm) {
        try {
          await loadNames({ silent: true });
        } catch (e) {
          setStatusError(e);
        }
        activeSearchTab = "document";
        syncTabUiOnly("document");
        if (documentInputEl) documentInputEl.value = norm;
        await runDocumentSearch({
          syncUrl: false,
          preferredPhoto: photoFromQuery,
          documentPrefix: norm,
          apiPhoto: photoFromQuery || undefined,
        });
        syncDocumentQueryToUrl(norm);
        if (photoFromQuery) syncPhotoQueryToUrl(photoFromQuery);
        persistTabState("document");
        return;
      }
      try {
        await loadNames({ silent: true });
      } catch (e) {
        setStatusError(e);
      }
      activeSearchTab = "document";
      syncTabUiOnly("document");
      if (documentInputEl) documentInputEl.value = docRaw;
      updateDocumentValidationUi();
      setStatus(DOCUMENT_ID_FORMAT_MESSAGE, true);
      applyUrlForCurrentTab();
      persistTabState("document");
      return;
    }

    if (personIdsRaw) {
      const personIds = personIdsRaw
        .split(",")
        .map((x) => String(x || "").trim())
        .filter(Boolean);
      if (!personIds.length) return;
      const seen = new Set();
      const dedupedIds = personIds.filter((id) => {
        if (seen.has(id)) return false;
        seen.add(id);
        return true;
      });
      try {
        await loadNames();
      } catch (e) {
        setStatusError(e);
      }
      activeSearchTab = "people";
      syncTabUiOnly("people");
      selected = dedupedIds.map((person_id) => {
        const raw = namesById[person_id];
        const name =
          raw != null && String(raw).trim() ? String(raw).trim() : null;
        return { person_id, name };
      });
      renderSelected();
      if (selected.length) {
        await runPeopleSearch({
          syncUrl: false,
          preferredPhoto: photoFromQuery,
          apiPhoto: photoFromQuery || undefined,
        });
      }
      syncPeopleQueryToUrl();
      if (photoFromQuery) syncPhotoQueryToUrl(photoFromQuery);
      persistTabState("people");
      return;
    }

    if (tabParam === "document") {
      activeSearchTab = "document";
      syncTabUiOnly("document");
      updateDocumentValidationUi();
      applyUrlForCurrentTab();
      persistTabState("document");
      return;
    }

    activeSearchTab = "people";
    syncTabUiOnly("people");
    applyUrlForCurrentTab();
    persistTabState("people");
  }

  async function initPage() {
    try {
      await loadNames({ silent: true });
    } catch (e) {
      setStatusError(e);
    }
    await initFromQueryString();
    updateSearchButton();
  }

  initPage();
})();
</script>

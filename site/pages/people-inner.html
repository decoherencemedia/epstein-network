<main class="site-page people-page" id="main">
  <div class="people-top">
    <header class="people-heading">
      <h1 class="people-title">
        <span class="people-title-main">People</span>
        <span class="people-title-count" id="people-title-count"></span>
      </h1>
    </header>
    <div class="people-toolbar">
      <div class="people-filter-wrap">
        <input
          type="search"
          id="people-filter-input"
          class="search-input people-filter-input"
          placeholder="Search by name…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search people by name"
          disabled />
      </div>
      <div class="people-class-dropdown">
        <button
          type="button"
          id="people-class-filter-btn"
          class="people-class-filter-btn"
          aria-expanded="false"
          aria-haspopup="true"
          aria-controls="people-class-panel"
          aria-label="Choose which categories of people to include"
          title="Categories">
          <span class="people-class-filter-btn-icon" aria-hidden="true">
            <img src="/images/icons/filter-icon.svg" width="28" height="28" alt="" decoding="async" />
          </span>
        </button>
        <div
          id="people-class-panel"
          class="people-class-panel"
          hidden
          role="dialog"
          aria-label="Categories to include">
          <div class="people-class-panel-inner" role="group" aria-label="Include people from">
            <label class="people-class-option">
              <input type="checkbox" id="people-class-named" value="named" checked />
              <span>Named</span>
            </label>
            <label class="people-class-option">
              <input type="checkbox" id="people-class-unknown" value="unknown" checked />
              <span>Unknown</span>
            </label>
            <label class="people-class-option">
              <input type="checkbox" id="people-class-unidentified" value="unidentified" />
              <span>Unidentified</span>
            </label>
            <label class="people-class-option">
              <input type="checkbox" id="people-class-ignored" value="ignored" />
              <span>Ignored</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <p class="people-status" id="people-status" role="status" aria-live="polite">Loading…</p>

  <div class="people-grid" id="people-grid" hidden></div>
  <div class="search-results-more" id="people-results-more" hidden>
    <button type="button" class="search-submit-btn" id="people-load-more">Load more</button>
  </div>
</main>

<script src="/js/latinize.js"></script>
<script src="/js/shared.js"></script>
<script>
  (async function () {
    function displayName(row) {
      return SiteShared.personDisplayName(row.person_id, row.name, (n) => "Person " + n);
    }

    function photoLabel(n) {
      const x = Number(n);
      if (x === 1) return "1 photo";
      return x + " photos";
    }

    const statusEl = document.getElementById("people-status");
    const gridEl = document.getElementById("people-grid");
    const countEl = document.getElementById("people-title-count");
    const filterInputEl = document.getElementById("people-filter-input");
    const loadMoreWrap = document.getElementById("people-results-more");
    const loadMoreBtn = document.getElementById("people-load-more");
    const classFilterBtn = document.getElementById("people-class-filter-btn");
    const classPanel = document.getElementById("people-class-panel");
    const CLASS_ORDER = ["named", "unknown", "unidentified", "ignored"];
    const DEFAULT_CLASSES = ["named", "unknown"];
    const PEOPLE_PAGE_SIZE = 1000;

    let allRows = [];
    let totalRows = 0;
    let isLoadingMore = false;

    function arraysEqualAsSets(a, b) {
      if (a.length !== b.length) return false;
      var x = a.slice().sort().join("\0");
      var y = b.slice().sort().join("\0");
      return x === y;
    }

    function parseClassesFromUrl() {
      var params = new URLSearchParams(window.location.search);
      if (!params.has("classes")) {
        return DEFAULT_CLASSES.slice();
      }
      var raw = params.get("classes");
      if (raw === null || String(raw).trim() === "") {
        return [];
      }
      return String(raw)
        .split(",")
        .map(function (s) {
          return s.trim().toLowerCase();
        })
        .filter(Boolean);
    }

    function applyClassesToCheckboxes(selected) {
      var set = {};
      selected.forEach(function (k) {
        set[k] = true;
      });
      CLASS_ORDER.forEach(function (k) {
        var el = document.getElementById("people-class-" + k);
        if (el) el.checked = !!set[k];
      });
    }

    function selectedClassesFromUi() {
      return CLASS_ORDER.filter(function (k) {
        var el = document.getElementById("people-class-" + k);
        return el && el.checked;
      });
    }

    function syncUrlFromClasses(sel) {
      var params = new URLSearchParams(window.location.search);
      if (sel.length === 0) {
        params.set("classes", "");
      } else if (arraysEqualAsSets(sel, DEFAULT_CLASSES)) {
        params.delete("classes");
      } else {
        params.set("classes", sel.slice().sort().join(","));
      }
      var q = params.toString();
      var path = window.location.pathname || "/people/";
      var newUrl = path + (q ? "?" + q : "") + window.location.hash;
      history.replaceState(null, "", newUrl);
    }

    function facesApiUrlForClasses(sel, limit, offset) {
      var base = SiteShared.API_BASE + "/faces";
      var params = new URLSearchParams();
      params.set("limit", String(limit));
      params.set("offset", String(offset));
      if (sel.length === 0) {
        params.set("classes", "");
        return base + "?" + params.toString();
      }
      if (arraysEqualAsSets(sel, DEFAULT_CLASSES)) {
        return base + "?" + params.toString();
      }
      params.set("classes", sel.slice().sort().join(","));
      return base + "?" + params.toString();
    }

    function updateLoadMoreVisibility() {
      if (!loadMoreWrap || !loadMoreBtn) return;
      var hasMore = allRows.length < totalRows;
      loadMoreWrap.hidden = !hasMore;
      loadMoreBtn.disabled = isLoadingMore;
      loadMoreBtn.textContent = isLoadingMore ? "Loading more…" : "Load more";
    }

    function setClassPanelOpen(open) {
      if (!classPanel || !classFilterBtn) return;
      classPanel.hidden = !open;
      classFilterBtn.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function placeholderEl() {
      const d = document.createElement("div");
      d.className = "people-tile-placeholder";
      d.setAttribute("aria-hidden", "true");
      return d;
    }

    function renderGrid(rows) {
      gridEl.innerHTML = "";
      rows.forEach(function (row) {
        const name = displayName(row);
        const article = document.createElement("article");
        article.className = "people-tile";

        const link = document.createElement("a");
        link.className = "people-tile-link";
        const pid = String(row.person_id || "").trim();
        link.href = SiteShared.peopleUrlForPersonIds([pid]) || "#";
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.title = name + " — open in Search";

        const media = document.createElement("div");
        media.className = "people-tile-media";

        const url = SiteShared.cdnAssetUrl(row.image);
        if (url) {
          const img = document.createElement("img");
          img.className = "people-tile-img";
          img.src = url;
          img.alt = name;
          img.loading = "lazy";
          img.decoding = "async";
          img.onerror = function () {
            img.remove();
            media.appendChild(placeholderEl());
          };
          media.appendChild(img);
        } else {
          media.appendChild(placeholderEl());
        }

        const cap = document.createElement("div");
        cap.className = "people-tile-caption";
        const nameEl = document.createElement("span");
        nameEl.className = "people-tile-name";
        nameEl.textContent = name;
        const countLine = document.createElement("span");
        countLine.className = "people-tile-photos";
        countLine.textContent = photoLabel(row.photo_count);
        cap.appendChild(nameEl);
        cap.appendChild(countLine);

        link.appendChild(media);
        link.appendChild(cap);
        article.appendChild(link);
        gridEl.appendChild(article);
      });
    }

    function updateSubtitle(query, shownCount, loaded, total) {
      const q = String(query || "").trim();
      if (!total) {
        countEl.textContent = "";
        return;
      }
      if (!q) {
        countEl.textContent = loaded < total ? loaded + " of " + total + " people" : total + " people";
        return;
      }
      if (shownCount === 0) {
        countEl.textContent = "No matches";
        return;
      }
      countEl.textContent = shownCount + " of " + loaded + " loaded (" + total + " total)";
    }

    function applyFilter() {
      const q = SiteShared.normalizePersonSearchKey(filterInputEl ? filterInputEl.value : "");
      if (!allRows.length) {
        return;
      }
      let filtered = allRows;
      if (q) {
        filtered = allRows.filter(function (row) {
          const name = SiteShared.normalizePersonSearchKey(displayName(row));
          return name.indexOf(q) !== -1;
        });
      }
      renderGrid(filtered);
      updateSubtitle(filterInputEl ? filterInputEl.value : "", filtered.length, allRows.length, totalRows);
    }

    async function loadPeopleFromApi(reset) {
      var sel = selectedClassesFromUi();
      if (reset) {
        syncUrlFromClasses(sel);
        statusEl.textContent = "Loading…";
        statusEl.hidden = false;
        gridEl.hidden = true;
        allRows = [];
        totalRows = 0;
        updateLoadMoreVisibility();
        if (filterInputEl) filterInputEl.disabled = true;
      } else {
        isLoadingMore = true;
        updateLoadMoreVisibility();
      }
      try {
        var offset = reset ? 0 : allRows.length;
        var res = await fetch(facesApiUrlForClasses(sel, PEOPLE_PAGE_SIZE, offset), { credentials: "omit" });
        if (!res.ok) {
          var errMsg = "HTTP " + res.status;
          try {
            var errBody = await res.json();
            if (errBody && errBody.message) errMsg = String(errBody.message);
          } catch (_e1) {}
          throw new Error(errMsg);
        }
        var body = await res.json();
        var pageRows = body && body.data ? body.data : [];
        totalRows = body && typeof body.total === "number" ? body.total : pageRows.length;
        allRows = reset ? pageRows : allRows.concat(pageRows);
        statusEl.textContent = "";
        statusEl.hidden = true;
        gridEl.hidden = false;
        renderGrid(allRows);
        applyFilter();
        updateLoadMoreVisibility();
        if (filterInputEl) filterInputEl.disabled = false;
      } catch (err) {
        statusEl.textContent =
          "Could not load people (" + (err && err.message ? err.message : "error") + ").";
        gridEl.hidden = true;
        updateLoadMoreVisibility();
      } finally {
        isLoadingMore = false;
        updateLoadMoreVisibility();
      }
    }

    applyClassesToCheckboxes(parseClassesFromUrl());

    CLASS_ORDER.forEach(function (k) {
      var el = document.getElementById("people-class-" + k);
      if (el) {
        el.addEventListener("change", function () {
          loadPeopleFromApi(true);
        });
      }
    });

    if (classFilterBtn && classPanel) {
      classFilterBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        setClassPanelOpen(classPanel.hidden);
      });
      document.addEventListener("click", function () {
        setClassPanelOpen(false);
      });
      classPanel.addEventListener("click", function (e) {
        e.stopPropagation();
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") setClassPanelOpen(false);
      });
    }

    if (loadMoreBtn) {
      loadMoreBtn.addEventListener("click", function () {
        if (isLoadingMore) return;
        loadPeopleFromApi(false);
      });
    }

    await loadPeopleFromApi(true);
    if (filterInputEl) {
      filterInputEl.addEventListener("input", applyFilter);
    }
  })();
</script>

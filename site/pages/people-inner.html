<main class="site-page people-page" id="main">
  <h1 class="site-page-title">People</h1>
  <p class="site-page-lead">Select one or more people, then search for photos where they all appear together</p>

  <section class="people-toolbar" aria-label="Select people">
    <div class="people-autocomplete-wrap">
      <div class="people-autocomplete">
        <input
          id="people-search-input"
          type="text"
          class="people-search-input"
          placeholder="Type a name…"
          aria-label="Search people by name"
          autocomplete="off"
          spellcheck="false"
          aria-autocomplete="list"
          aria-controls="people-search-listbox"
          aria-expanded="false"
          role="combobox"
        />
        <ul id="people-search-listbox" class="people-search-results" role="listbox" hidden></ul>
      </div>
    </div>

    <div class="people-selected" id="people-selected" aria-label="Selected people"></div>

    <div class="people-actions">
      <button type="button" class="people-graph-btn" id="people-open-graph" disabled title="Select 1 or 2 people to open in graph">Open in graph</button>
      <button type="button" class="people-search-btn" id="people-run-search" disabled>Search photos</button>
    </div>
  </section>

  <p class="people-status" id="people-status" role="status" aria-live="polite"></p>

  <section class="people-results-wrap" id="people-results-wrap" hidden>
    <h2 class="people-results-heading">Photos</h2>
    <div class="people-masonry" id="people-masonry"></div>
  </section>

  <div class="people-lightbox" id="people-lightbox" hidden aria-hidden="true">
    <div class="people-lightbox-dialog" role="dialog" aria-modal="true" aria-label="Photo viewer">
      <button type="button" class="people-lightbox-close" id="people-lightbox-close" aria-label="Close viewer">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M6 6l12 12"></path>
          <path d="M18 6l-12 12"></path>
        </svg>
      </button>
      <button type="button" class="people-lightbox-nav people-lightbox-prev" id="people-lightbox-prev" aria-label="Previous photo">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M15 18l-6-6 6-6"></path>
        </svg>
      </button>
      <div class="people-lightbox-stage" id="people-lightbox-stage">
        <img id="people-lightbox-image" class="people-lightbox-image" alt="" />
        <div id="people-lightbox-bboxes" class="people-lightbox-bboxes" aria-hidden="true"></div>
      </div>
      <button type="button" class="people-lightbox-nav people-lightbox-next" id="people-lightbox-next" aria-label="Next photo">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M9 6l6 6-6 6"></path>
        </svg>
      </button>
      <div class="people-lightbox-footer">
        <p class="people-lightbox-count" id="people-lightbox-count"></p>
        <p class="people-lightbox-filename" id="people-lightbox-filename"></p>
        <a class="people-lightbox-pdf-link" id="people-lightbox-pdf-link" href="#" target="_blank" rel="noopener">View original PDF</a>
      </div>
    </div>
  </div>
</main>

<script src="../js/shared.js"></script>
<script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js" crossorigin="anonymous"></script>
<script>
(function () {
  const API_BASE = "https://api.epstein.photos";
  async function fetchPeopleNamesJson() {
    let res = await fetch(API_BASE + "/people", { credentials: "omit" });
    if (res.status === 404) {
      res = await fetch(API_BASE + "/people/names", { credentials: "omit" });
    }
    return res;
  }
  const PHOTOS_URL = API_BASE + "/photos";
  const CDN_IMAGES = "https://epstein.sfo3.cdn.digitaloceanspaces.com/images/";
  const CDN_THUMBNAILS = "https://epstein.sfo3.cdn.digitaloceanspaces.com/thumbnails/";
  const PEOPLE_NAMES_CACHE_KEY = "people_names_cache_v1";
  const PEOPLE_NAMES_CACHE_TTL_MS = 24 * 60 * 60 * 1000;

  const inputEl = document.getElementById("people-search-input");
  const listboxEl = document.getElementById("people-search-listbox");
  const selectedEl = document.getElementById("people-selected");
  const searchBtn = document.getElementById("people-run-search");
  const openGraphBtn = document.getElementById("people-open-graph");
  const statusEl = document.getElementById("people-status");
  const resultsWrap = document.getElementById("people-results-wrap");
  const masonryEl = document.getElementById("people-masonry");
  const lightboxEl = document.getElementById("people-lightbox");
  const lightboxStageEl = document.getElementById("people-lightbox-stage");
  const lightboxImgEl = document.getElementById("people-lightbox-image");
  const lightboxBboxesEl = document.getElementById("people-lightbox-bboxes");
  const lightboxCountEl = document.getElementById("people-lightbox-count");
  const lightboxFilenameEl = document.getElementById("people-lightbox-filename");
  const lightboxPdfLinkEl = document.getElementById("people-lightbox-pdf-link");
  const lightboxCloseBtn = document.getElementById("people-lightbox-close");
  const lightboxPrevBtn = document.getElementById("people-lightbox-prev");
  const lightboxNextBtn = document.getElementById("people-lightbox-next");

  /** Same order as chips: first selected = index 0, … */
  const PERSON_COLOR_PALETTE = ['#018700', '#b500ff', '#05acc6', '#97ff00', '#ffa52f', '#ff8ec8', '#79525e', '#00fdcf', '#afa5ff'];

  function hexToRgb(hex) {
    const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(String(hex).trim());
    if (!m) return null;
    return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
  }

  function chipBackgroundTint(hex) {
    const rgb = hexToRgb(hex);
    if (!rgb) return "rgba(0, 0, 0, 0.06)";
    return "rgba(" + rgb.r + "," + rgb.g + "," + rgb.b + ",0.2)";
  }

  function rgbaWithAlpha(hex, alpha) {
    const rgb = hexToRgb(hex);
    if (!rgb) return "rgba(0, 0, 0, " + alpha + ")";
    return "rgba(" + rgb.r + "," + rgb.g + "," + rgb.b + "," + alpha + ")";
  }

  function displayNameForPersonId(personId) {
    const selectedMatch = selected.find(function (p) {
      return p.person_id === personId;
    });
    if (selectedMatch && selectedMatch.name && String(selectedMatch.name).trim()) {
      return String(selectedMatch.name).trim();
    }
    const raw = namesById[personId];
    if (raw != null && String(raw).trim()) {
      return String(raw).trim();
    }
    return /^person_\d+$/i.test(String(personId)) ? "Unidentified" : String(personId);
  }

  function openPersonPage(personId) {
    const pid = String(personId || "").trim();
    if (!pid) return;
    const helper = window.SiteShared;
    if (helper && typeof helper.peopleUrlForPersonIds === "function" && typeof helper.openInNewTab === "function") {
      const url = helper.peopleUrlForPersonIds([pid]);
      if (!url) return;
      helper.openInNewTab(url);
      return;
    }
    const params = new URLSearchParams();
    params.set("person_ids", pid);
    window.open("/people/?" + params.toString(), "_blank", "noopener,noreferrer");
  }

  function attachOpenPersonPageHandler(el, personId, titleText) {
    if (!el) return;
    el.title = titleText || "";
    el.addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      openPersonPage(personId);
    });
  }

  function getDatasetNumber(number) {
    if (number <= 3158) return 1;
    if (number <= 3857) return 2;
    if (number <= 5586) return 3;
    if (number <= 8320) return 4;
    if (number <= 8528) return 5;
    if (number <= 8998) return 6;
    if (number <= 9664) return 7;
    if (number <= 39023) return 8;
    if (number <= 1262781) return 9;
    if (number <= 2212882) return 10;
    if (number <= 2730262) return 11;
    if (number <= 2731790) return 12;
    return null;
  }

  function buildOriginalPdfUrl(imageFile) {
    const image = String(imageFile || "");
    if (!image) return null;
    const fileId = image.split("-")[0];
    if (!fileId) return null;
    const numberRaw = fileId.replace(/\D+/g, "");
    const number = Number.parseInt(numberRaw, 10);
    if (!Number.isFinite(number)) return null;
    const dataset = getDatasetNumber(number);
    if (!dataset) return null;
    const pdfName = fileId + ".pdf";
    return "https://www.justice.gov/epstein/files/DataSet%20" + dataset + "/" + encodeURIComponent(pdfName);
  }

  /**
   * Specified people (in `selected`) use the same colors as their chips (palette by index).
   * Everyone else in `faces` cycles through palette entries not used by any specified person,
   * in stable order (sorted person_id), so an unspecified face never shares a color with a
   * specified person. If no palette slots remain, uses extra hues not in the specified set.
   * @param {Record<string, unknown>} faces
   * @returns {Record<string, string>}
   */
  function buildFaceColorMap(faces) {
    const map = Object.create(null);
    if (!faces || typeof faces !== "object") return map;

    const n = PERSON_COLOR_PALETTE.length;
    const specifiedColors = selected.map(function (_, i) {
      return PERSON_COLOR_PALETTE[i % n];
    });
    const usedBySpecified = new Set(specifiedColors);

    selected.forEach(function (p, i) {
      map[p.person_id] = PERSON_COLOR_PALETTE[i % n];
    });

    const unspecifiedIds = Object.keys(faces).filter(function (pid) {
      return selected.every(function (p) {
        return p.person_id !== pid;
      });
    });
    unspecifiedIds.sort();

    const unusedFromPalette = PERSON_COLOR_PALETTE.filter(function (c) {
      return !usedBySpecified.has(c);
    });

    const OVERFLOW_EXTRAS = [
      "#5c6bc0",
      "#26a69a",
      "#ef5350",
      "#ab47bc",
      "#29b6f6",
      "#78909c",
      "#8d6e63",
      "#546e7a",
      "#90a4ae",
    ];

    // Non-selected people should never reuse a selected person's chip/box color.
    unspecifiedIds.forEach(function (pid, j) {
      if (unusedFromPalette.length > 0) {
        map[pid] = unusedFromPalette[j % unusedFromPalette.length];
        return;
      }
      const pool = OVERFLOW_EXTRAS.filter(function (c) {
        return !usedBySpecified.has(c);
      });
      if (pool.length > 0) {
        map[pid] = pool[j % pool.length];
        return;
      }
      const hue = (j * 53 + String(pid).length * 17) % 360;
      map[pid] = "hsl(" + hue + ", 42%, 44%)";
    });

    return map;
  }

  /**
   * @param {unknown} row
   * @returns {{ image: string, faces: Record<string, {left:number,top:number,width:number,height:number}> }}
   */
  function normalizePhotoRow(row) {
    if (typeof row === "string") {
      return { image: row, faces: {} };
    }
    if (!row || typeof row !== "object") {
      return { image: "", faces: {} };
    }
    const image = row.image || row.image_name || row.filename || "";
    const faces = row.faces && typeof row.faces === "object" ? row.faces : {};
    return { image: String(image), faces };
  }

  function parseFaceBox(faces, pid) {
    const b = faces && faces[pid];
    if (!b || typeof b !== "object") return null;
    const left = Number(b.left);
    const top = Number(b.top);
    const w = Number(b.width);
    const h = Number(b.height);
    if (![left, top, w, h].every(function (x) { return Number.isFinite(x); })) return null;
    return { left, top, w, h };
  }

  function sortedFaceIds(faces) {
    return Object.keys(faces).sort(function (a, b) {
      const ay = Number(faces[a] && faces[a].top);
      const by = Number(faces[b] && faces[b].top);
      if (Number.isFinite(ay) && Number.isFinite(by) && ay !== by) return ay - by;
      return a.localeCompare(b);
    });
  }

  function appendThumbFaceBoxes(overlayEl, faces) {
    overlayEl.innerHTML = "";
    if (!faces || typeof faces !== "object") return;
    const colorMap = buildFaceColorMap(faces);
    Object.keys(faces).forEach(function (pid) {
      const boxData = parseFaceBox(faces, pid);
      if (!boxData) return;
      const box = document.createElement("div");
      box.className = "people-face-box";
      box.style.left = boxData.left * 100 + "%";
      box.style.top = boxData.top * 100 + "%";
      box.style.width = boxData.w * 100 + "%";
      box.style.height = boxData.h * 100 + "%";
      box.style.borderColor = colorMap[pid] || "#888";
      overlayEl.appendChild(box);
    });
  }

  /** Pixel geometry of the image bitmap as drawn with object-fit: contain inside the img element. */
  function getContainedImageRect(img) {
    const nw = img.naturalWidth;
    const nh = img.naturalHeight;
    const cw = img.clientWidth;
    const ch = img.clientHeight;
    if (!nw || !nh || !cw || !ch) return null;
    const scale = Math.min(cw / nw, ch / nh);
    const dw = nw * scale;
    const dh = nh * scale;
    const ox = (cw - dw) / 2;
    const oy = (ch - dh) / 2;
    return { ox, oy, dw, dh };
  }

  function rectsOverlap(a, b) {
    return !(a.right <= b.left || a.left >= b.right || a.bottom <= b.top || a.top >= b.bottom);
  }

  function placeLabelWithoutOverlap(labelEl, desiredLeft, desiredTops, bounds, occupied, anchor) {
    const labelRect = labelEl.getBoundingClientRect();
    const w = labelRect.width || labelEl.offsetWidth;
    const h = labelRect.height || labelEl.offsetHeight;
    // Keep label within image bounds and horizontally overlapping its own bbox domain.
    // Allow left/right movement as long as the label is not completely outside the bbox x-domain.
    const minLeft = Math.max(bounds.left, anchor.left - w);
    const maxLeft = Math.min(bounds.right - w, anchor.right);
    const clampedMinLeft = Math.min(minLeft, maxLeft);
    const clampedMaxLeft = Math.max(minLeft, maxLeft);
    const minTop = bounds.top;
    const maxTop = Math.max(minTop, bounds.bottom - h);
    const step = Math.max(8, Math.round(w * 0.65));
    const preferredTops = Array.isArray(desiredTops) ? desiredTops : [desiredTops];
    const topCandidates = preferredTops
      .map(function (rawTop) {
        return Math.max(minTop, Math.min(Number(rawTop), maxTop));
      })
      .filter(function (x, i, arr) {
        return Number.isFinite(x) && arr.indexOf(x) === i;
      });
    if (!topCandidates.length) topCandidates.push(minTop);

    function candidateAt(rawLeft, top) {
      const left = Math.max(clampedMinLeft, Math.min(rawLeft, clampedMaxLeft));
      return { left, top, right: left + w, bottom: top + h };
    }

    function overlapArea(a, b) {
      const iw = Math.max(0, Math.min(a.right, b.right) - Math.max(a.left, b.left));
      const ih = Math.max(0, Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top));
      return iw * ih;
    }

    function scoreCandidate(c) {
      let overlap = 0;
      for (let i = 0; i < occupied.length; i++) {
        overlap += overlapArea(c, occupied[i]);
      }
      // Tiny distance tie-breaker: keep near desired placement unless overlap says otherwise.
      const horizontalPenalty = Math.abs(c.left - desiredLeft) * 0.001;
      const verticalPenalty = Math.min.apply(
        null,
        topCandidates.map(function (t) {
          return Math.abs(c.top - t);
        })
      ) * 0.001;
      const distancePenalty = horizontalPenalty + verticalPenalty;
      return overlap + distancePenalty;
    }

    const rawCandidates = [desiredLeft, anchor.left, anchor.right - w, anchor.left - w, anchor.right];
    for (let k = 1; k <= 10; k++) {
      rawCandidates.push(desiredLeft + step * k);
      rawCandidates.push(desiredLeft - step * k);
    }

    let candidate = candidateAt(rawCandidates[0], topCandidates[0]);
    let bestScore = scoreCandidate(candidate);
    for (let t = 0; t < topCandidates.length; t++) {
      for (let i = 0; i < rawCandidates.length; i++) {
        if (t === 0 && i === 0) continue;
        const c = candidateAt(rawCandidates[i], topCandidates[t]);
        const s = scoreCandidate(c);
        if (s < bestScore) {
          candidate = c;
          bestScore = s;
        }
        if (bestScore === 0) break;
      }
      if (bestScore === 0) break;
    }

    labelEl.style.left = candidate.left + "px";
    labelEl.style.top = candidate.top + "px";
    occupied.push(candidate);
  }

  function renderLightboxFaceBoxes() {
    lightboxBboxesEl.innerHTML = "";
    if (!lightboxPhotos.length || lightboxIndex < 0) return;
    const item = lightboxPhotos[lightboxIndex];
    const faces = item.faces;
    if (!faces || typeof faces !== "object") return;
    const rect = getContainedImageRect(lightboxImgEl);
    if (!rect) return;
    const ox = rect.ox;
    const oy = rect.oy;
    const dw = rect.dw;
    const dh = rect.dh;
    const colorMap = buildFaceColorMap(faces);
    const faceIds = sortedFaceIds(faces);
    // Two-phase render: boxes first, then labels. This lets labels avoid both boxes and earlier labels.
    const labelQueue = [];
    const occupiedRects = [];
    const bounds = { left: ox, top: oy, right: ox + dw, bottom: oy + dh };
    faceIds.forEach(function (pid) {
      const boxData = parseFaceBox(faces, pid);
      if (!boxData) return;
      const box = document.createElement("div");
      box.className = "people-face-box";
      box.style.left = ox + boxData.left * dw + "px";
      box.style.top = oy + boxData.top * dh + "px";
      box.style.width = boxData.w * dw + "px";
      box.style.height = boxData.h * dh + "px";
      const color = colorMap[pid] || "#888";
      box.style.borderColor = color;
      const openTitle = "Open " + displayNameForPersonId(pid);
      attachOpenPersonPageHandler(box, pid, openTitle);
      lightboxBboxesEl.appendChild(box);
      occupiedRects.push({
        left: ox + boxData.left * dw,
        top: oy + boxData.top * dh,
        right: ox + (boxData.left + boxData.w) * dw,
        bottom: oy + (boxData.top + boxData.h) * dh,
      });

      const label = document.createElement("div");
      label.className = "people-face-label";
      label.textContent = displayNameForPersonId(pid);
      label.style.background = rgbaWithAlpha(color, 0.9);
      attachOpenPersonPageHandler(label, pid, openTitle);
      lightboxBboxesEl.appendChild(label);
      labelQueue.push({
        el: label,
        left: ox + boxData.left * dw,
        topBottom: oy + (boxData.top + boxData.h) * dh,
        topAbove: oy + boxData.top * dh,
        anchorLeft: ox + boxData.left * dw,
        anchorRight: ox + (boxData.left + boxData.w) * dw,
      });
    });

    labelQueue.forEach(function (entry) {
      const labelRect = entry.el.getBoundingClientRect();
      const labelHeight = labelRect.height || entry.el.offsetHeight;
      placeLabelWithoutOverlap(
        entry.el,
        entry.left,
        [entry.topBottom, entry.topAbove - labelHeight],
        bounds,
        occupiedRects,
        { left: entry.anchorLeft, right: entry.anchorRight }
      );
    });
  }

  let lightboxResizeObserver = null;

  /** @type {any} */
  let peopleMasonryInstance = null;
  let masonryResizeTimer = null;

  function destroyPeopleMasonry() {
    if (peopleMasonryInstance) {
      peopleMasonryInstance.destroy();
      peopleMasonryInstance = null;
    }
  }

  function clearSearchResults() {
    destroyPeopleMasonry();
    masonryEl.innerHTML = "";
    resultsWrap.hidden = true;
    setStatus("");
  }

  async function fetchPhotoItemsForSelection() {
    const params = new URLSearchParams();
    params.set("person_ids", selected.map((p) => p.person_id).join(","));
    const url = PHOTOS_URL + "?" + params.toString();
    const res = await fetch(url, { credentials: "omit" });
    if (!res.ok) throw new Error("Request failed (" + res.status + ")");
    const json = await res.json();
    const raw = json.data;
    if (!Array.isArray(raw)) throw new Error("Unexpected response shape");
    return raw
      .map(function (x) {
        return normalizePhotoRow(x);
      })
      .filter(function (p) {
        return p.image && String(p.image).trim();
      });
  }

  function renderPhotoResults(photoItems) {
    const lightboxPayload = photoItems.map(function (p) {
      return {
        url: CDN_IMAGES + encodeURIComponent(String(p.image)),
        image: String(p.image),
        faces: p.faces,
      };
    });
    const sizer = document.createElement("div");
    sizer.className = "people-masonry-sizer";
    sizer.setAttribute("aria-hidden", "true");
    masonryEl.appendChild(sizer);

    const frag = document.createDocumentFragment();
    photoItems.forEach(function (photo, idx) {
      const item = document.createElement("div");
      item.className = "people-masonry-item";
      const img = document.createElement("img");
      const encodedName = encodeURIComponent(String(photo.image));
      const thumbSrc = CDN_THUMBNAILS + encodedName;
      const fullSrc = lightboxPayload[idx].url;
      img.src = thumbSrc;
      img.alt = "";
      img.loading = "lazy";
      img.decoding = "async";
      const wrap = document.createElement("div");
      wrap.className = "people-thumb-wrap";
      const bboxes = document.createElement("div");
      bboxes.className = "people-thumb-bboxes";
      appendThumbFaceBoxes(bboxes, photo.faces);
      wrap.appendChild(img);
      wrap.appendChild(bboxes);
      const a = document.createElement("a");
      a.href = fullSrc;
      a.addEventListener("click", function (e) {
        e.preventDefault();
        openLightbox(lightboxPayload, idx);
      });
      a.appendChild(wrap);
      item.appendChild(a);
      frag.appendChild(item);
    });
    masonryEl.appendChild(frag);
    resultsWrap.hidden = false;

    peopleMasonryInstance = new Masonry(masonryEl, {
      itemSelector: ".people-masonry-item",
      columnWidth: ".people-masonry-sizer",
      percentPosition: true,
      gutter: 12,
      transitionDuration: 0,
    });

    imagesLoaded(masonryEl, function () {
      if (peopleMasonryInstance) peopleMasonryInstance.layout();
    });
    return lightboxPayload;
  }

  /** @type {{ person_id: string, name: string | null }[]} */
  let selected = [];
  /** @type {{ person_id: string, label: string }[]} */
  let nameIndex = [];
  /** Raw person_id -> name from API (value may be null). */
  let namesById = {};
  let namesLoaded = false;
  let activeIndex = -1;
  /** @type {{ url: string, image: string, faces: Record<string, {left:number,top:number,width:number,height:number}> }[]} */
  let lightboxPhotos = [];
  let lightboxIndex = -1;
  let lightboxTouchStartX = null;
  let lightboxTouchStartY = null;

  function updateLightboxMeta(item, totalCount) {
    lightboxCountEl.textContent = (lightboxIndex + 1) + " / " + totalCount;
    lightboxFilenameEl.textContent = item.image || "";
    const pdfUrl = buildOriginalPdfUrl(item.image);
    lightboxPdfLinkEl.href = pdfUrl || "#";
    lightboxPdfLinkEl.hidden = !pdfUrl;
  }

  function resetLightboxMeta() {
    lightboxCountEl.textContent = "";
    lightboxFilenameEl.textContent = "";
    lightboxPdfLinkEl.href = "#";
    lightboxPdfLinkEl.hidden = true;
  }

  function renderLightboxImage() {
    if (!lightboxPhotos.length || lightboxIndex < 0) return;
    const item = lightboxPhotos[lightboxIndex];
    updateLightboxMeta(item, lightboxPhotos.length);
    syncPhotoQueryToUrl(item.image || null);

    function applyFacesWhenReady() {
      if (lightboxImgEl.naturalWidth && lightboxImgEl.naturalHeight) {
        renderLightboxFaceBoxes();
      }
    }

    lightboxImgEl.onload = function () {
      applyFacesWhenReady();
    };
    lightboxImgEl.src = item.url;
    if (lightboxImgEl.complete) {
      applyFacesWhenReady();
    } else {
      lightboxBboxesEl.innerHTML = "";
    }
  }

  function openLightbox(photos, index) {
    if (!Array.isArray(photos) || !photos.length) return;
    lightboxPhotos = photos.slice();
    lightboxIndex = Math.max(0, Math.min(index, lightboxPhotos.length - 1));
    lightboxBboxesEl.innerHTML = "";
    if (lightboxResizeObserver && lightboxStageEl) {
      lightboxResizeObserver.disconnect();
      lightboxResizeObserver = null;
    }
    renderLightboxImage();
    lightboxEl.hidden = false;
    lightboxEl.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
    if (typeof ResizeObserver !== "undefined" && lightboxStageEl) {
      lightboxResizeObserver = new ResizeObserver(function () {
        if (!lightboxEl.hidden) renderLightboxFaceBoxes();
      });
      lightboxResizeObserver.observe(lightboxStageEl);
    }
  }

  function closeLightbox() {
    if (lightboxResizeObserver) {
      lightboxResizeObserver.disconnect();
      lightboxResizeObserver = null;
    }
    lightboxEl.hidden = true;
    lightboxEl.setAttribute("aria-hidden", "true");
    lightboxImgEl.src = "";
    lightboxImgEl.onload = null;
    lightboxBboxesEl.innerHTML = "";
    resetLightboxMeta();
    lightboxPhotos = [];
    lightboxIndex = -1;
    lightboxTouchStartX = null;
    lightboxTouchStartY = null;
    syncPhotoQueryToUrl(null);
    document.body.style.overflow = "";
  }

  function showPrevLightboxImage() {
    if (!lightboxPhotos.length) return;
    lightboxIndex = (lightboxIndex - 1 + lightboxPhotos.length) % lightboxPhotos.length;
    renderLightboxImage();
  }

  function showNextLightboxImage() {
    if (!lightboxPhotos.length) return;
    lightboxIndex = (lightboxIndex + 1) % lightboxPhotos.length;
    renderLightboxImage();
  }

  function navigateLightbox(direction) {
    if (direction === "prev") {
      showPrevLightboxImage();
      return;
    }
    if (direction === "next") {
      showNextLightboxImage();
      return;
    }
    if (direction === "close") {
      closeLightbox();
    }
  }

  function onLightboxTouchStart(e) {
    if (lightboxEl.hidden) return;
    if (!e.touches || e.touches.length !== 1) {
      lightboxTouchStartX = null;
      lightboxTouchStartY = null;
      return;
    }
    lightboxTouchStartX = e.touches[0].clientX;
    lightboxTouchStartY = e.touches[0].clientY;
  }

  function onLightboxTouchEnd(e) {
    if (lightboxEl.hidden) return;
    if (lightboxTouchStartX == null || lightboxTouchStartY == null) return;
    if (!e.changedTouches || !e.changedTouches.length) return;
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const dx = endX - lightboxTouchStartX;
    const dy = endY - lightboxTouchStartY;
    lightboxTouchStartX = null;
    lightboxTouchStartY = null;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (absDx < 40 || absDx <= absDy) return;
    navigateLightbox(dx < 0 ? "next" : "prev");
  }

  function setStatus(msg, isError) {
    statusEl.textContent = msg || "";
    statusEl.classList.toggle("people-status-error", !!isError);
  }

  function setStatusError(err) {
    setStatus(String((err && err.message) || err), true);
  }

  function updateSearchButton() {
    searchBtn.disabled = selected.length === 0;
  }

  function graphUrlForSelectedPeople() {
    const ids = selected.map((p) => String(p.person_id || "").trim()).filter(Boolean);
    if (ids.length === 1) {
      const params = new URLSearchParams();
      params.set("person_id", ids[0]);
      return "/?" + params.toString();
    }
    if (ids.length === 2) {
      const params = new URLSearchParams();
      params.set("person_ids", ids.join(","));
      return "/?" + params.toString();
    }
    return null;
  }

  function updateOpenGraphButton() {
    if (!openGraphBtn) return;
    const count = selected.length;
    const enabled = count === 1 || count === 2;
    openGraphBtn.disabled = !enabled;
    if (enabled) {
      openGraphBtn.title = count === 1
        ? "Open graph focused on this person"
        : "Open graph focused on this edge";
    } else if (count === 0) {
      openGraphBtn.title = "Select 1 or 2 people to open in graph";
    } else {
      openGraphBtn.title = "'Open in graph' supports 1 person (node) or 2 people (edge)";
    }
  }

  function renderSelected() {
    selectedEl.innerHTML = "";
    selected.forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "people-chip";
      card.setAttribute("data-person-id", p.person_id);
      const accent = PERSON_COLOR_PALETTE[i % PERSON_COLOR_PALETTE.length];
      card.style.border = "2px solid " + accent;
      card.style.background = chipBackgroundTint(accent);
      card.style.color = "#1a1a1a";
      const label = document.createElement("span");
      label.className = "people-chip-label";
      label.textContent = p.name || p.person_id;
      const rm = document.createElement("button");
      rm.type = "button";
      rm.className = "people-chip-remove";
      rm.setAttribute("aria-label", "Remove " + (p.name || p.person_id));
      rm.textContent = "×";
      rm.addEventListener("click", () => {
        selected.splice(i, 1);
        renderSelected();
        updateSearchButton();
        clearSearchResults();
      });
      card.appendChild(label);
      card.appendChild(rm);
      selectedEl.appendChild(card);
    });
    updateSearchButton();
    updateOpenGraphButton();
  }

  function buildIndex(dataObj) {
    namesById = dataObj || {};
    nameIndex = Object.keys(namesById).map((person_id) => {
      const n = namesById[person_id];
      const label = n != null && String(n).trim() ? String(n).trim() : person_id;
      return { person_id, label };
    });
    nameIndex.sort((a, b) => a.label.localeCompare(b.label, undefined, { sensitivity: "base" }));
  }

  function readNamesCache() {
    try {
      const raw = window.localStorage.getItem(PEOPLE_NAMES_CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return null;
      if (typeof parsed.ts !== "number") return null;
      if (!parsed.data || typeof parsed.data !== "object") return null;
      if (Date.now() - parsed.ts > PEOPLE_NAMES_CACHE_TTL_MS) return null;
      return parsed.data;
    } catch (_) {
      return null;
    }
  }

  function writeNamesCache(dataObj) {
    try {
      window.localStorage.setItem(
        PEOPLE_NAMES_CACHE_KEY,
        JSON.stringify({ ts: Date.now(), data: dataObj })
      );
    } catch (_) {
      // Ignore localStorage errors (quota/private mode/etc).
    }
  }

  async function loadNames(options) {
    if (namesLoaded) return;
    const opts = options || {};
    const cached = readNamesCache();
    if (cached) {
      buildIndex(cached);
      namesLoaded = true;
      return;
    }
    if (!opts.silent) setStatus("Loading names…");
    const res = await fetchPeopleNamesJson();
    if (!res.ok) throw new Error("Failed to load people (" + res.status + ")");
    const json = await res.json();
    const data = json.data;
    if (!data || typeof data !== "object") throw new Error("Unexpected response from /people/names");
    buildIndex(data);
    writeNamesCache(data);
    namesLoaded = true;
    if (!opts.silent) setStatus("");
  }

  function filterMatches(q) {
    const query = (q || "").trim().toLowerCase();
    if (!query) return [];
    return nameIndex.filter(
      (row) =>
        row.label.toLowerCase().includes(query) || row.person_id.toLowerCase().includes(query)
    ).slice(0, 40);
  }

  function setListboxOpen(isOpen) {
    listboxEl.hidden = !isOpen;
    inputEl.setAttribute("aria-expanded", isOpen ? "true" : "false");
  }

  function renderListbox(matches) {
    listboxEl.innerHTML = "";
    if (!matches.length) {
      setListboxOpen(false);
      activeIndex = -1;
      return;
    }
    matches.forEach((row, i) => {
      const li = document.createElement("li");
      li.setAttribute("role", "option");
      li.id = "people-opt-" + i;
      li.dataset.personId = row.person_id;
      li.className = "people-search-option";
      li.textContent = row.label;
      li.addEventListener("mousedown", (e) => {
        e.preventDefault();
        pickPerson(row.person_id);
      });
      listboxEl.appendChild(li);
    });
    setListboxOpen(true);
    activeIndex = -1;
  }

  function pickPerson(person_id) {
    if (selected.some((p) => p.person_id === person_id)) return;
    const raw = namesById[person_id];
    const name =
      raw != null && String(raw).trim() ? String(raw).trim() : null;
    selected.push({ person_id, name });
    inputEl.value = "";
    setListboxOpen(false);
    renderSelected();
  }

  function getSelectedPersonIds() {
    return selected.map((p) => p.person_id);
  }

  function syncPeopleQueryToUrl() {
    const params = new URLSearchParams(window.location.search);
    const ids = getSelectedPersonIds();
    if (ids.length) {
      params.set("person_ids", ids.join(","));
    } else {
      params.delete("person_ids");
    }
    const qs = params.toString();
    const nextUrl =
      window.location.pathname +
      (qs ? "?" + qs : "") +
      window.location.hash;
    window.history.replaceState(null, "", nextUrl);
  }

  function syncPhotoQueryToUrl(photoFilename) {
    const params = new URLSearchParams(window.location.search);
    const photo = String(photoFilename || "").trim();
    if (photo) {
      params.set("photo", photo);
    } else {
      params.delete("photo");
    }
    const qs = params.toString();
    const nextUrl =
      window.location.pathname +
      (qs ? "?" + qs : "") +
      window.location.hash;
    window.history.replaceState(null, "", nextUrl);
  }

  inputEl.addEventListener("input", () => {
    if (!namesLoaded) return;
    renderListbox(filterMatches(inputEl.value));
  });

  inputEl.addEventListener("focus", async () => {
    try {
      await loadNames();
      renderListbox(filterMatches(inputEl.value));
    } catch (e) {
      setStatusError(e);
    }
  });

  inputEl.addEventListener("keydown", (e) => {
    const opts = listboxEl.querySelectorAll(".people-search-option");
    if (!opts.length) return;
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      e.preventDefault();
      activeIndex = e.key === "ArrowDown"
        ? Math.min(activeIndex + 1, opts.length - 1)
        : Math.max(activeIndex - 1, 0);
      opts.forEach((el, i) => el.classList.toggle("people-search-option-active", i === activeIndex));
      return;
    }
    if (e.key === "Enter" && activeIndex >= 0) {
      e.preventDefault();
      pickPerson(opts[activeIndex].dataset.personId);
      return;
    }
    if (e.key === "Escape") setListboxOpen(false);
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".people-autocomplete")) setListboxOpen(false);
  });

  lightboxCloseBtn.addEventListener("click", () => navigateLightbox("close"));
  lightboxPrevBtn.addEventListener("click", () => navigateLightbox("prev"));
  lightboxNextBtn.addEventListener("click", () => navigateLightbox("next"));
  lightboxStageEl.addEventListener("touchstart", onLightboxTouchStart, { passive: true });
  lightboxStageEl.addEventListener("touchend", onLightboxTouchEnd, { passive: true });
  lightboxStageEl.addEventListener("touchcancel", function () {
    lightboxTouchStartX = null;
    lightboxTouchStartY = null;
  }, { passive: true });
  lightboxEl.addEventListener("click", (e) => {
    if (e.target === lightboxEl) navigateLightbox("close");
  });
  document.addEventListener("keydown", (e) => {
    if (lightboxEl.hidden) return;
    const direction = e.key === "Escape"
      ? "close"
      : e.key === "ArrowLeft"
        ? "prev"
        : e.key === "ArrowRight"
          ? "next"
          : null;
    if (!direction) return;
    e.preventDefault();
    navigateLightbox(direction);
  });

  window.addEventListener("resize", function () {
    if (!lightboxEl.hidden) {
      renderLightboxFaceBoxes();
    }
    if (!peopleMasonryInstance) return;
    clearTimeout(masonryResizeTimer);
    masonryResizeTimer = setTimeout(function () {
      if (peopleMasonryInstance) {
        peopleMasonryInstance.reloadItems();
        peopleMasonryInstance.layout();
      }
    }, 150);
  });

  async function runSearch(options) {
    const opts = options || {};
    const shouldSyncUrl = opts.syncUrl !== false;
    const preferredPhoto = String(opts.preferredPhoto || "").trim();
    if (!selected.length) return;
    if (shouldSyncUrl) {
      syncPeopleQueryToUrl();
    }
    if (!preferredPhoto) {
      syncPhotoQueryToUrl(null);
    }
    setStatus("Searching…");
    resultsWrap.hidden = true;
    destroyPeopleMasonry();
    masonryEl.innerHTML = "";
    try {
      const photoItems = await fetchPhotoItemsForSelection();
      if (photoItems.length === 0) {
        setStatus("No photos found for this combination.");
        return;
      }
      const lightboxPayload = renderPhotoResults(photoItems);
      if (preferredPhoto) {
        const preferredIdx = lightboxPayload.findIndex(function (p) {
          return String(p.image) === preferredPhoto;
        });
        if (preferredIdx >= 0) {
          openLightbox(lightboxPayload, preferredIdx);
        }
      }
      setStatus(photoItems.length + " photo" + (photoItems.length === 1 ? "" : "s") + " found");
    } catch (e) {
      setStatusError(e);
    }
  }

  searchBtn.addEventListener("click", async () => {
    await runSearch({ syncUrl: true });
  });

  openGraphBtn.addEventListener("click", function () {
    const url = graphUrlForSelectedPeople();
    if (!url) return;
    const helper = window.SiteShared;
    if (helper && typeof helper.openInNewTab === "function") {
      helper.openInNewTab(url);
      return;
    }
    window.open(url, "_blank", "noopener,noreferrer");
  });

  async function initFromQueryString() {
    const params = new URLSearchParams(window.location.search);
    const personIdsRaw = params.get("person_ids");
    const photoFromQuery = String(params.get("photo") || "").trim();
    if (!personIdsRaw) return;
    const personIds = personIdsRaw
      .split(",")
      .map((x) => String(x || "").trim())
      .filter(Boolean);
    if (!personIds.length) return;
    const seen = new Set();
    const dedupedIds = personIds.filter((id) => {
      if (seen.has(id)) return false;
      seen.add(id);
      return true;
    });
    try {
      await loadNames();
    } catch (e) {
      setStatusError(e);
    }
    selected = dedupedIds.map((person_id) => {
      const raw = namesById[person_id];
      const name =
        raw != null && String(raw).trim() ? String(raw).trim() : null;
      return { person_id, name };
    });
    renderSelected();
    if (selected.length) {
      await runSearch({ syncUrl: false, preferredPhoto: photoFromQuery });
    }
  }

  async function initPage() {
    try {
      await loadNames({ silent: true });
    } catch (e) {
      setStatusError(e);
    }
    await initFromQueryString();
  }

  initPage();
})();
</script>
